<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Orca Encounter VR - Descriptive Writing Sandbox</title>
    <meta name="description" content="Immersive Orca Experience for Sec 4 NA English">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <audio id="ocean-ambient" src="https://actions.google.com/sounds/v1/ambiences/underwater_ambience.ogg" preload="auto" loop="true"></audio>
      </a-assets>

      <a-entity id="rig" position="0 0 5">
        <a-camera look-controls WASD-controls>
          <a-entity position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.6; radiusOuter: 0.62"
                    material="color: #00ffff; opacity: 0.3; shader: flat">
            <a-text value="DEPTH: 15M | TEMP: 2C" position="-0.4 0.4 0" scale="0.2 0.2 0.2" color="#00ffff"></a-text>
            <a-text value="OXYGEN: OPTIMAL" position="-0.35 -0.4 0" scale="0.15 0.15 0.15" color="#00ffff"></a-text>
          </a-entity>
        </a-camera>
      </a-entity>

      <a-entity sound="src: #ocean-ambient; autoplay: true; volume: 0.8; loop: true"></a-entity>

      <a-sky color="#031124"></a-sky>
      <a-scene fog="type: exponential; color: #031124; density: 0.08"></a-scene>

      <a-cylinder position="0 20 -5" radius="15" height="0.5" color="#4deeea" opacity="0.2" material="shader: flat"></a-cylinder>

      <a-entity id="orca-group" position="-15 -2 -8" rotation="0 45 0">
        <a-animation attribute="position" from="-20 -2 -12" to="20 -1 -8" dur="25000" repeat="indefinite" ease="linear"></a-animation>
        <a-animation attribute="rotation" from="0 60 -5" to="0 110 5" dur="25000" repeat="indefinite" ease="linear"></a-animation>

        <a-entity geometry="primitive: ellipsoid; radius: 2 1.5 5" material="color: #111111"></a-entity>
        
        <a-entity geometry="primitive: ellipsoid; radius: 1.2 0.5 3" position="0 -1 0.5" material="color: #ffffff"></a-entity>
        
        <a-entity geometry="primitive: sphere; radius: 0.25" scale="1 0.4 2" position="1.1 0.5 -2" material="color: #ffffff" rotation="15 20 0"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.25" scale="1 0.4 2" position="-1.1 0.5 -2" material="color: #ffffff" rotation="15 -20 0"></a-entity>
        
        <a-entity geometry="primitive: cone; radiusBottom: 0.6; height: 3" position="0 2.5 0" rotation="-20 0 0" material="color: #111111"></a-entity>
        
        <a-entity geometry="primitive: box; width: 2; height: 0.2; depth: 1" position="2 -0.5 -0.5" rotation="0 0 -20" material="color: #111111"></a-entity>
        <a-entity geometry="primitive: box; width: 2; height: 0.2; depth: 1" position="-2 -0.5 -0.5" rotation="0 0 20" material="color: #111111"></a-entity>
      </a-entity>

      <a-sphere position="2 1 -2" radius="0.03" color="#a3fff6" opacity="0.6"></a-sphere>
      <a-sphere position="-3 -2 -4" radius="0.02" color="#a3fff6" opacity="0.4"></a-sphere>
      <a-sphere position="1 -1 -6" radius="0.04" color="#a3fff6" opacity="0.7"></a-sphere>
      <a-sphere position="-5 3 -2" radius="0.02" color="#a3fff6" opacity="0.5"></a-sphere>

      <a-light type="ambient" color="#0a2540" intensity="0.6"></a-light>
      <a-light type="directional" color="#4deeea" intensity="0.5" position="0 10 0"></a-light>
    </a-scene>
  </body>
</html>
