<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Orca Encounter VR - Descriptive Writing Sandbox</title>
    <meta name="description" content="Immersive Orca Experience for Sec 4 NA English">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #020b14; density: 0.06">
      
      <a-assets>
        <audio id="ocean-ambient" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto" loop="true"></audio>
      </a-assets>

      <a-entity id="rig" position="0 0 5">
        <a-camera look-controls WASD-controls>
          <a-entity position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.55; radiusOuter: 0.57"
                    material="color: #00ffff; opacity: 0.2; shader: flat">
            <a-cursor color="#00ffff" scale="0.5 0.5 0.5" opacity="0.5"></a-cursor>
            <a-text value="DEPTH: 15M | TEMP: 2C" position="-0.4 0.4 0" scale="0.18 0.18 0.18" color="#00ffff"></a-text>
            <a-text value="OXYGEN: OPTIMAL" position="-0.35 -0.4 0" scale="0.12 0.12 0.12" color="#00ffff"></a-text>
          </a-entity>
        </a-camera>
      </a-entity>

      <a-sky color="#031124"></a-sky>

      <a-cylinder position="0 15 -5" radius="12" height="0.2" color="#4deeea" opacity="0.15" material="shader: flat"></a-cylinder>

      <a-entity sound="src: #ocean-ambient; autoplay: true; volume: 0.5; loop: true"></a-entity>

      <a-entity id="orca-group" position="-15 -2 -10" rotation="0 75 0"
                animation="property: position; from: -20 -3 -12; to: 20 -1 -8; dur: 22000; loop: true; easing: linear"
                animation__rotation="property: rotation; from: 0 60 -3; to: 0 100 3; dur: 22000; loop: true; easing: linear">

        <a-entity geometry="primitive: ellipsoid; radius: 2 1.4 4.5" material="color: #111111; roughness: 0.1"></a-entity>
        
        <a-entity geometry="primitive: ellipsoid; radius: 1.1 0.4 2.8" position="0 -0.9 0.3" material="color: #ffffff"></a-entity>
        
        <a-entity geometry="primitive: sphere; radius: 0.22" scale="1 0.4 1.8" position="1.05 0.4 -1.8" material="color: #ffffff" rotation="15 20 0"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.22" scale="1 0.4 1.8" position="-1.05 0.4 -1.8" material="color: #ffffff" rotation="15 -20 0"></a-entity>
        
        <a-entity geometry="primitive: cone; radiusBottom: 0.5; height: 2.8" position="0 2.2 0" rotation="-15 0 0" material="color: #111111"></a-entity>
        
        <a-entity geometry="primitive: box; width: 1.8; height: 0.15; depth: 0.9" position="1.8 -0.4 -0.3" rotation="0 0 -15" material="color: #111111"></a-entity>
        <a-entity geometry="primitive: box; width: 1.8; height: 0.15; depth: 0.9" position="-1.8 -0.4 -0.3" rotation="0 0 15" material="color: #111111"></a-entity>

        <a-text id="vocab-hint" value="Look at its obsidian skin and monolithic size!" 
                position="0 3.5 0" scale="1.5 1.5 1.5" align="center" color="#ffffff" 
                visible="true" geometry="primitive: plane; width: 4.5; height: 0.8" material="color: #020b14; opacity: 0.8; radius: 0.1">
        </a-text>
      </a-entity>

      <a-sphere position="3 2 -3" radius="0.03" color="#a3fff6" opacity="0.5"></a-sphere>
      <a-sphere position="-4 -1 -5" radius="0.02" color="#a3fff6" opacity="0.4"></a-sphere>
      <a-sphere position="2 -2 -7" radius="0.04" color="#a3fff6" opacity="0.6"></a-sphere>
      <a-sphere position="-2 3 -4" radius="0.02" color="#a3fff6" opacity="0.3"></a-sphere>

      <a-light type="ambient" color="#0a2540" intensity="0.7"></a-light>
      <a-light type="directional" color="#4deeea" intensity="0.6" position="0 12 -2"></a-light>
    </a-scene>
  </body>
</html>
